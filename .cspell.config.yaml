#      THIS FILE IS MANAGED BY GITLAB-CONFIGURATION
# DIRECT MODIFICATIONS WILL BE AUTOMATICALLY OVERWRITTEN

$schema: https://raw.githubusercontent.com/streetsidesoftware/cspell/main/cspell.schema.json

version: "0.2"

name: health-quality-review

failFast: true
noConfigSearch: true
readonly: true
useGitignore: true

language: en-GB

languageSettings:
  - languageId: "*"
    allowCompoundWords: false

dictionaries:
  - project-words

dictionaryDefinitions:
  - name: project-words
    path: ./.cspell/project-words.txt
    addWords: true

ignorePaths:
  - .cspell.config.yaml
  - .pre-commit-config.yaml
  - catalog-info.yaml
  - .git

  # Build output
  - dist
  - build
  - target
  - out
  - bin
  - obj

  # Coverage
  - coverage
  - htmlcov
  - junit

  # Dependencies
  - node_modules
  - package.json
  - vendor

  # Generated docs
  - site

  # Editors
  - .idea
  - "*.iml"
  - .settings
  - .classpath
  - .project
  - "*.swp"
  - "*.swo"
  - "*~"

  # Lock files
  - package-lock.json
  - yarn.lock
  - pnpm-lock.yaml
  - Gemfile.lock
  - Cargo.lock
  - poetry.lock
  - Pipfile.lock
